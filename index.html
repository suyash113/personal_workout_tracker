<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suyash's Workout Tracker</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="workout-stage">
        <header>
            <div class="header-1">
                <img src="assets/dumbbells.svg" alt="" id="dumbell">
                <h1>Personal Workout Tracker</h1>
            </div>
            <div class="header-2">
                <p>Select your workout session</p>
                <p id="current-date"></p>
            </div>
        </header>
        <main >
            <div class="upper">
                <div class="back-biceps">
                    <img src="assets/back.jpg" alt="" class="image">
                    <div class="overlay">
                        <h2 class="text">BACK/BICEPS 💪🏽</h2>
                    </div>
                </div>
                <div class="chest-triceps">
                    <img src="assets/chest.jpg" alt="" class="image">
                    <div class="overlay">
                        <h2 class="text">CHEST/TRICEPS 🔥</h2>
                    </div>
                </div>
            </div>
            <div class="lower">
                <div class="legs">
                    <img src="assets/legs.jpg" alt="" class="image">
                    <div class="overlay">
                        <h2 class="text">LEGS 🦵🏽</h2>
                    </div>
                </div>
                <div class="shoulder">
                    <img src="assets/shoulder.jpg" alt="" class="image">
                    <div class="overlay">
                        <h2 class="text">SHOULDER/ABS 🔥</h2>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
